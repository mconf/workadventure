name: Build multi-arch image

on:
  workflow_call:
    inputs:
      dockerio-image-name:
        required: true
        type: string
      # If true, the build will contain the arm64 image and push to DockerHub
      final_build:
        required: false
        type: boolean
        default: false
      push-to-registry:
        required: true
        type: boolean
      dockerfile:
        required: true
        type: string
      context:
        required: true
        type: string
      short_name:
        required: true
        type: string
      fast_build:
        required: false
        type: boolean
        default: false


jobs:
  build-amd-image:
    uses: ./.github/workflows/build-single-image.yml
    secrets: inherit
    with:
      os: ubuntu-24.04
      platform: amd64
      image-name: ${{ inputs.dockerio-image-name }}
      dockerfile: ${{ inputs.dockerfile }}
      context: ${{ inputs.context }}
      short_name: ${{ inputs.short_name }}
      push-to-registry: ${{ inputs.push-to-registry }}
      final_build: ${{ inputs.final_build }}
      fast_build: ${{ inputs.fast_build }}

  build-arm-image:
    uses: ./.github/workflows/build-single-image.yml
    if: ${{ inputs.final_build == true }}
    secrets: inherit
    with:
      os: ubuntu-24.04-arm
      platform: arm64
      image-name: ${{ inputs.dockerio-image-name }}
      dockerfile: ${{ inputs.dockerfile }}
      context: ${{ inputs.context }}
      short_name: ${{ inputs.short_name }}
      push-to-registry: ${{ inputs.push-to-registry }}
      final_build: ${{ inputs.final_build }}
      fast_build: ${{ inputs.fast_build }}

  merge-image:
    runs-on: ubuntu-latest
    needs:
      - build-amd-image
      - build-arm-image
    if: ${{ inputs.final_build == true }}
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        if: ${{ github.event_name == 'push' || github.event_name == 'release' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: rlespinasse/github-slug-action@4.2.3

      - name: Create and push manifest
        run: |
          docker manifest create ${{ inputs.dockerio-image-name }}:${{ github.event_name == 'pull_request' && env.GITHUB_HEAD_REF_SLUG || env.GITHUB_REF_SLUG }} \
            ${{ inputs.dockerio-image-name }}:amd64-${{ github.sha }} \
            ${{ inputs.dockerio-image-name }}:arm64-${{ github.sha }}
          docker manifest push ${{ inputs.dockerio-image-name }}:${{ github.event_name == 'pull_request' && env.GITHUB_HEAD_REF_SLUG || env.GITHUB_REF_SLUG }}

      - name: Special tag for master branch
        if: ${{ github.ref == 'refs/heads/master' }}
        run: |
          docker buildx imagetools create \
            --tag ${{ inputs.dockerio-image-name }}:master-${{ github.sha }} \
            ${{ inputs.dockerio-image-name }}:${{ github.event_name == 'pull_request' && env.GITHUB_HEAD_REF_SLUG || env.GITHUB_REF_SLUG }}
